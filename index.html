<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMI Teleop</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a2e;
            --accent: #4361ee;
            --subtle: #6c757d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                         "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        .accent-bar {
            width: 60px;
            height: 4px;
            background: var(--accent);
            margin: 1.5rem auto 0;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>UMI Teleop</h1>
        <div class="accent-bar"></div>
    </div>
</body>
</html>
